<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vvinify Admin Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .admin-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      text-align: center;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .stat-number {
      font-size: 2.5em;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }

    .stat-label {
      color: #666;
      font-size: 1.1em;
    }

    .users-table {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .users-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .users-table th,
    .users-table td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    .users-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
    }

    .premium-toggle {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }

    .premium-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #667eea;
    }

    input:checked + .slider:before {
      transform: translateX(26px);
    }

    .admin-login {
      max-width: 400px;
      margin: 100px auto;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .admin-login h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    .admin-login input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }

    .admin-login button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .admin-login button:hover {
      background: #5a67d8;
    }

    .logout-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #e53e3e;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #c53030;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="adminLogin" class="admin-login">
    <h2>Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Enter admin password" />
    <button onclick="adminLogin()">Login</button>
  </div>

  <div id="adminDashboard" class="hidden">
    <button class="logout-btn" onclick="adminLogout()">Logout</button>

    <div class="admin-container">
      <div class="admin-header">
        <h1>🎛️ Vvinify Admin Dashboard</h1>
        <p>Manage users and premium accounts</p>
      </div>

      <div class="admin-stats">
        <div class="stat-card">
          <div class="stat-number" id="totalUsers">0</div>
          <div class="stat-label">Total Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="premiumUsers">0</div>
          <div class="stat-label">Premium Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="freeUsers">0</div>
          <div class="stat-label">Free Users</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="conversionRate">0%</div>
          <div class="stat-label">Premium Conversion</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="newUsersToday">0</div>
          <div class="stat-label">New Users Today</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="avgSessionTime">0m</div>
          <div class="stat-label">Avg Session Time</div>
        </div>
      </div>

      <div class="users-table">
        <div style="padding: 20px; background: white; border-radius: 10px 10px 0 0; border-bottom: 1px solid #eee;">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin: 0; color: #333;">User Management</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
              <input type="text" id="userSearch" placeholder="Search users..." style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; width: 200px;">
              <select id="userFilter" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px;">
                <option value="all">All Users</option>
                <option value="premium">Premium Only</option>
                <option value="free">Free Only</option>
              </select>
              <button onclick="exportUsers()" style="background: #48bb78; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer;">Export CSV</button>
            </div>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"></th>
              <th>Name</th>
              <th>Email</th>
              <th>Signup Date</th>
              <th>Premium Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody">
            <!-- Users will be populated here -->
          </tbody>
        </table>
      </div>

      <div style="background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); padding: 20px; margin-top: 20px;">
        <h3 style="margin-top: 0; color: #333;">Bulk Actions</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
          <button onclick="bulkAction('makePremium')" style="background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Make Selected Premium</button>
          <button onclick="bulkAction('makeFree')" style="background: #ed8936; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Make Selected Free</button>
          <button onclick="bulkAction('delete')" style="background: #e53e3e; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Delete Selected</button>
          <button onclick="selectAll()" style="background: #48bb78; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Select All</button>
        </div>
      </div>
    </div>
  </div>

<!-- Firebase SDK -->
<script type="module">
  // Import Firebase modules
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
  import { getAuth } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js';
  import { getFirestore } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js';

  // Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDUMMY_API_KEY_FOR_DEMO",
    authDomain: "vvvinify-demo.firebaseapp.com",
    projectId: "vvvinify-demo",
    storageBucket: "vvvinify-demo.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef123456"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Make Firebase available globally for the admin.js script
  window.firebaseApp = app;
  window.firebaseAuth = auth;
  window.firebaseDb = db;
</script>
<script src="js/admin.js"></script>
</body>
</html>
